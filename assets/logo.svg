<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0C1029"/>
      <stop offset="100%" stop-color="#06081A"/>
    </radialGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00B8D4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="400" cy="400" r="360"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="400" cy="400" r="400" fill="#06081A"/>
  <circle cx="400" cy="400" r="360" fill="url(#bgGrad)" stroke="#0E1433" stroke-width="2"/>

  <!-- Subtle outer ring -->
  <circle cx="400" cy="400" r="358" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.15"/>
  <circle cx="400" cy="400" r="350" fill="none" stroke="#00E5FF" stroke-width="0.5" opacity="0.08"/>

  <!-- Grid dots background (subtle data feel) -->
  <g opacity="0.06" clip-path="url(#circleClip)">
    <circle cx="200" cy="200" r="2" fill="#00E5FF"/>
    <circle cx="280" cy="200" r="2" fill="#00E5FF"/>
    <circle cx="360" cy="200" r="2" fill="#00E5FF"/>
    <circle cx="440" cy="200" r="2" fill="#00E5FF"/>
    <circle cx="520" cy="200" r="2" fill="#00E5FF"/>
    <circle cx="600" cy="200" r="2" fill="#00E5FF"/>
    <circle cx="200" cy="280" r="2" fill="#00E5FF"/>
    <circle cx="280" cy="280" r="2" fill="#00E5FF"/>
    <circle cx="360" cy="280" r="2" fill="#00E5FF"/>
    <circle cx="440" cy="280" r="2" fill="#00E5FF"/>
    <circle cx="520" cy="280" r="2" fill="#00E5FF"/>
    <circle cx="600" cy="280" r="2" fill="#00E5FF"/>
    <circle cx="200" cy="520" r="2" fill="#00E5FF"/>
    <circle cx="280" cy="520" r="2" fill="#00E5FF"/>
    <circle cx="360" cy="520" r="2" fill="#00E5FF"/>
    <circle cx="440" cy="520" r="2" fill="#00E5FF"/>
    <circle cx="520" cy="520" r="2" fill="#00E5FF"/>
    <circle cx="600" cy="520" r="2" fill="#00E5FF"/>
    <circle cx="200" cy="600" r="2" fill="#00E5FF"/>
    <circle cx="280" cy="600" r="2" fill="#00E5FF"/>
    <circle cx="360" cy="600" r="2" fill="#00E5FF"/>
    <circle cx="440" cy="600" r="2" fill="#00E5FF"/>
    <circle cx="520" cy="600" r="2" fill="#00E5FF"/>
    <circle cx="600" cy="600" r="2" fill="#00E5FF"/>
  </g>

  <!-- "D" letter - left side -->
  <g filter="url(#glow)">
    <path d="M 220,260 L 220,540 L 320,540 Q 420,540 420,400 Q 420,260 320,260 Z"
          fill="none" stroke="url(#cyanGlow)" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- "V" letter - right side -->
  <g filter="url(#glow)">
    <path d="M 400,260 L 490,540 L 580,260"
          fill="none" stroke="url(#cyanGlow)" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- Rising bar chart integrated at bottom of the V -->
  <g filter="url(#softGlow)" opacity="0.9">
    <rect x="440" y="490" width="16" height="40" rx="2" fill="#00E5FF" opacity="0.5"/>
    <rect x="462" y="470" width="16" height="60" rx="2" fill="#00E5FF" opacity="0.65"/>
    <rect x="484" y="445" width="16" height="85" rx="2" fill="#00E5FF" opacity="0.8"/>
    <rect x="506" y="415" width="16" height="115" rx="2" fill="#FFB800" opacity="0.9"/>
  </g>

  <!-- Small accent dot -->
  <circle cx="530" cy="405" r="4" fill="#FFB800" filter="url(#softGlow)" opacity="0.8"/>
</svg>